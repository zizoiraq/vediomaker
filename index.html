<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولد فيديوهات القرآن الكريم - بجوامع تركية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a2f44, #1e4d6e, #2c7a9e);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #0a2f44, #1e4d6e, #2c7a9e);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 20px;
            padding: 20px;
        }

        .control-panel, .preview-panel {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
        }

        h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #1e4d6e;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #34495e;
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            font-family: 'Amiri', serif;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-primary {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #0a2f44, #1e4d6e, #2c7a9e);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            padding: 10px 20px;
            background: #1e4d6e;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }

        .ayah-preview {
            background: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            border: 2px solid #1e4d6e;
            min-height: 200px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .ayah-preview::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
        }

        .preview-content {
            position: relative;
            z-index: 2;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .arabic {
            font-family: 'Amiri', serif;
            font-size: 2.5em;
            margin-bottom: 20px;
            color: white;
            line-height: 1.8;
        }

        .progress-container {
            margin-top: 20px;
        }

        .progress-bar {
            height: 20px;
            background: #ecf0f1;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #0a2f44, #1e4d6e, #2c7a9e);
            transition: width 0.3s;
        }

        #resultVideo {
            width: 100%;
            border-radius: 10px;
            margin: 10px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .background-selector {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
            max-height: 300px;
            overflow-y: auto;
        }

        .bg-option {
            cursor: pointer;
            border: 3px solid transparent;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s;
            height: 100px;
        }

        .bg-option:hover {
            transform: scale(1.05);
        }

        .bg-option.selected {
            border-color: #fdbb2d;
        }

        .bg-option img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info-box {
            background: #e1f0fa;
            border-right: 4px solid #1e4d6e;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #1e4d6e;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🕌 مولد فيديوهات القرآن الكريم</h1>
            <p>بخلفيات جوامع تركية وتلاوات نقية</p>
        </header>

        <div class="main-content">
            <!-- لوحة التحكم -->
            <div class="control-panel">
                <h2>⚙️ الإعدادات</h2>
                
                <div class="info-box">
                    <strong>✅ تم التحديث: خلفيات جوامع تركية + تلاوات مباشرة</strong>
                </div>

                <div class="form-group">
                    <label>🎤 اختر القارئ:</label>
                    <select id="reciter" class="form-control">
                        <option value="">جاري تحميل القراء...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>📖 اختر السورة:</label>
                    <select id="surah" class="form-control" disabled>
                        <option value="">اختر القارئ أولاً</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>من آية:</label>
                        <input type="number" id="fromAyah" class="form-control" min="1" value="1">
                    </div>
                    <div class="form-group">
                        <label>إلى آية:</label>
                        <input type="number" id="toAyah" class="form-control" min="1" value="3">
                    </div>
                </div>

                <div class="form-group">
                    <label>🕌 اختر خلفية الفيديو (جوامع تركية):</label>
                    <div class="background-selector" id="backgroundSelector">
                        <!-- سيتم تعبئتها بالصور عبر JavaScript -->
                    </div>
                </div>

                <button id="generateBtn" class="btn-primary">🎬 إنشاء الفيديو</button>
            </div>

            <!-- المعاينة -->
            <div class="preview-panel">
                <h2>👁️ المعاينة</h2>
                
                <div id="ayahPreview" class="ayah-preview">
                    <div class="preview-content">
                        <div class="arabic" id="previewArabic"></div>
                    </div>
                </div>

                <div id="progressArea" style="display: none;">
                    <h3>⏳ جاري إنشاء الفيديو...</h3>
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill" style="width: 0%;"></div>
                    </div>
                    <p id="progressStatus">بدء المعالجة...</p>
                </div>

                <div id="resultArea" style="display: none;">
                    <h3>✅ تم إنشاء الفيديو!</h3>
                    <video id="resultVideo" controls></video>
                    <button id="downloadBtn" class="btn-secondary">⬇️ تحميل الفيديو</button>
                    <button id="newVideoBtn" class="btn-secondary">🆕 فيديو جديد</button>
                </div>

                <div id="errorArea" style="display: none; color: #721c24; background: #f8d7da; padding: 15px; border-radius: 8px;"></div>
            </div>
        </div>
    </div>

    <script>
        // ==================== بيانات الصور ====================
        const TURKISH_MOSQUES = [
            {
                name: 'جامع آيا صوفيا - اسطنبول',
                url: 'https://images.unsplash.com/photo-1541432901042-2d8bd64b4a9b?q=80&w=1000&auto=format&fit=crop'
            },
            {
                name: 'الجامع الأزرق - اسطنبول',
                url: 'https://images.unsplash.com/photo-1571055107559-3e67626fa8be?q=80&w=1000&auto=format&fit=crop'
            },
            {
                name: 'جامع سليمان القانوني - اسطنبول',
                url: 'https://images.unsplash.com/photo-1591287084182-3d1e5fb2590f?q=80&w=1000&auto=format&fit=crop'
            },
            {
                name: 'جامع أورتاكوي - اسطنبول',
                url: 'https://images.unsplash.com/photo-1565098735462-5db3412ac4bc?q=80&w=1000&auto=format&fit=crop'
            },
            {
                name: 'جامع رستم باشا - اسطنبول',
                url: 'https://images.unsplash.com/photo-1591025207163-942350e47db5?q=80&w=1000&auto=format&fit=crop'
            },
            {
                name: 'جامع الفاتح - اسطنبول',
                url: 'https://images.unsplash.com/photo-1584277261846-c865f3da0e0d?q=80&w=1000&auto=format&fit=crop'
            },
            {
                name: 'جامع يني - اسطنبول',
                url: 'https://images.unsplash.com/photo-1564769625905-50e93615e769?q=80&w=1000&auto=format&fit=crop'
            },
            {
                name: 'جامع دولمة باهجة - اسطنبول',
                url: 'https://images.unsplash.com/photo-1561391010-e4d443db5fc8?q=80&w=1000&auto=format&fit=crop'
            }
        ];

        // قائمة السور
        const SURAHS = [
            { number: 1, name: 'الفاتحة', ayahs: 7 },
            { number: 2, name: 'البقرة', ayahs: 286 },
            { number: 3, name: 'آل عمران', ayahs: 200 },
            { number: 4, name: 'النساء', ayahs: 176 },
            { number: 5, name: 'المائدة', ayahs: 120 },
            { number: 6, name: 'الأنعام', ayahs: 165 },
            { number: 7, name: 'الأعراف', ayahs: 206 },
            { number: 8, name: 'الأنفال', ayahs: 75 },
            { number: 9, name: 'التوبة', ayahs: 129 },
            { number: 10, name: 'يونس', ayahs: 109 },
            { number: 11, name: 'هود', ayahs: 123 },
            { number: 12, name: 'يوسف', ayahs: 111 },
            { number: 13, name: 'الرعد', ayahs: 43 },
            { number: 14, name: 'إبراهيم', ayahs: 52 },
            { number: 15, name: 'الحجر', ayahs: 99 },
            { number: 16, name: 'النحل', ayahs: 128 },
            { number: 17, name: 'الإسراء', ayahs: 111 },
            { number: 18, name: 'الكهف', ayahs: 110 },
            { number: 19, name: 'مريم', ayahs: 98 },
            { number: 20, name: 'طه', ayahs: 135 }
        ];

        let selectedBgIndex = 0;
        let recitersData = [];

        // ==================== تحميل صور الجوامع ====================
        function loadMosqueBackgrounds() {
            const container = document.getElementById('backgroundSelector');
            container.innerHTML = '';
            
            TURKISH_MOSQUES.forEach((mosque, index) => {
                const div = document.createElement('div');
                div.className = `bg-option ${index === 0 ? 'selected' : ''}`;
                div.dataset.index = index;
                
                const img = document.createElement('img');
                img.src = mosque.url;
                img.alt = mosque.name;
                img.loading = 'lazy';
                
                div.appendChild(img);
                container.appendChild(div);
                
                div.addEventListener('click', function() {
                    document.querySelectorAll('.bg-option').forEach(opt => opt.classList.remove('selected'));
                    this.classList.add('selected');
                    selectedBgIndex = parseInt(this.dataset.index);
                    updatePreviewBackground();
                });
            });
        }

        // ==================== تحديث خلفية المعاينة ====================
        function updatePreviewBackground() {
            const preview = document.getElementById('ayahPreview');
            preview.style.backgroundImage = `url('${TURKISH_MOSQUES[selectedBgIndex].url}')`;
        }

        // ==================== تحميل القراء من API ====================
        async function loadReciters() {
            try {
                const response = await axios.get('https://www.mp3quran.net/api/v3/reciters?language=ar');
                recitersData = response.data.reciters;
                
                const select = document.getElementById('reciter');
                select.innerHTML = '<option value="">اختر القارئ...</option>';
                
                recitersData.forEach(reciter => {
                    if (reciter.moshaf && reciter.moshaf.length > 0) {
                        const option = document.createElement('option');
                        option.value = reciter.id;
                        option.textContent = reciter.name;
                        select.appendChild(option);
                    }
                });
            } catch (error) {
                console.error('خطأ في تحميل القراء:', error);
                document.getElementById('reciter').innerHTML = '<option value="">خطأ في التحميل</option>';
            }
        }

        // ==================== تحميل السور ====================
        function loadSurahs() {
            const select = document.getElementById('surah');
            select.innerHTML = '<option value="">اختر السورة...</option>';
            select.disabled = false;
            
            SURAHS.forEach(surah => {
                const option = document.createElement('option');
                option.value = surah.number;
                option.textContent = `${surah.number}. ${surah.name}`;
                option.setAttribute('data-ayahs', surah.ayahs);
                select.appendChild(option);
            });
        }

        // ==================== جلب نص الآية ====================
        async function fetchAyahText(surah, ayah) {
            try {
                const response = await axios.get(`https://api.alquran.cloud/v1/ayah/${surah}:${ayah}`);
                return response.data.data.text;
            } catch (error) {
                console.error('خطأ:', error);
                return 'حدث خطأ في تحميل الآية';
            }
        }

        // ==================== الحصول على رابط التلاوة ====================
        function getAyahAudioUrl(reciterId, surahNumber, ayahNumber) {
            const reciter = recitersData.find(r => r.id == reciterId);
            if (!reciter || !reciter.moshaf || reciter.moshaf.length === 0) {
                return null;
            }

            // نأخذ أول رواية متاحة
            const moshaf = reciter.moshaf[0];
            
            // تنسيق رقم السورة والآية (3 أرقام لكل منهما)
            const surahStr = surahNumber.toString().padStart(3, '0');
            const ayahStr = ayahNumber.toString().padStart(3, '0');
            
            // بناء الرابط
            return `${moshaf.server}${surahStr}${ayahStr}.mp3`;
        }

        // ==================== تحديث المعاينة ====================
        async function updatePreview() {
            const surah = document.getElementById('surah').value;
            const fromAyah = document.getElementById('fromAyah').value;
            
            if (!surah) return;

            const text = await fetchAyahText(surah, fromAyah);
            document.getElementById('previewArabic').innerHTML = text;
            updatePreviewBackground();
        }

        // ==================== إنشاء الفيديو ====================
        async function generateVideo() {
            const surah = document.getElementById('surah').value;
            const fromAyah = parseInt(document.getElementById('fromAyah').value);
            const toAyah = parseInt(document.getElementById('toAyah').value);
            const reciterId = document.getElementById('reciter').value;

            if (!reciterId) {
                throw new Error('الرجاء اختيار القارئ');
            }

            updateProgress(5, 'جاري تحميل نصوص الآيات...');

            // تحميل نصوص الآيات
            const ayahTexts = [];
            for (let i = fromAyah; i <= toAyah; i++) {
                const text = await fetchAyahText(surah, i);
                ayahTexts.push({ number: i, text });
                updateProgress(5 + (i - fromAyah + 1) / (toAyah - fromAyah + 1) * 20, 
                    `تم تحميل الآية ${i - fromAyah + 1}/${toAyah - fromAyah + 1}`);
            }

            updateProgress(25, 'جاري تجهيز التلاوات الصوتية...');

            // تجهيز عناصر الصوت
            const audioElements = [];
            const audioPromises = [];

            for (let i = fromAyah; i <= toAyah; i++) {
                const audioUrl = getAyahAudioUrl(reciterId, surah, i);
                
                if (audioUrl) {
                    const audioPromise = fetch(audioUrl, { method: 'HEAD' })
                        .then(response => {
                            if (response.ok) {
                                const audio = new Audio();
                                audio.src = audioUrl;
                                audio.crossOrigin = 'anonymous';
                                audio.preload = 'auto';
                                return audio;
                            }
                            return null;
                        })
                        .catch(() => null);
                    
                    audioPromises.push(audioPromise);
                }
            }

            const loadedAudios = await Promise.all(audioPromises);
            loadedAudios.forEach(audio => {
                if (audio) audioElements.push(audio);
            });

            updateProgress(30, `تم تجهيز ${audioElements.length} ملف صوتي`);

            // إنشاء canvas للفيديو
            const canvas = document.createElement('canvas');
            canvas.width = 1280;
            canvas.height = 720;
            const ctx = canvas.getContext('2d');

            // إعداد تسجيل الفيديو
            const stream = canvas.captureStream(30);
            
            // محاولة إضافة الصوت
            if (audioElements.length > 0) {
                try {
                    // إنشاء AudioContext لخلط الصوتيات
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const dest = audioContext.createMediaStreamDestination();
                    
                    audioElements.forEach(audio => {
                        if (audio) {
                            audio.play().catch(e => console.log('لا يمكن تشغيل الصوت'));
                            const source = audioContext.createMediaElementSource(audio);
                            source.connect(dest);
                            source.connect(audioContext.destination);
                        }
                    });
                    
                    dest.stream.getAudioTracks().forEach(track => stream.addTrack(track));
                } catch (e) {
                    console.log('لا يمكن إضافة الصوت:', e);
                }
            }

            const recorder = new MediaRecorder(stream, { 
                mimeType: 'video/webm;codecs=vp9,opus',
                videoBitsPerSecond: 2500000
            });
            
            const chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                document.getElementById('resultVideo').src = url;
            };

            recorder.start();

            // رسم الآيات على canvas
            for (let i = 0; i < ayahTexts.length; i++) {
                const ayah = ayahTexts[i];
                const mosque = TURKISH_MOSQUES[selectedBgIndex];
                
                // تحميل صورة الخلفية
                const bgImage = new Image();
                bgImage.crossOrigin = 'anonymous';
                await new Promise((resolve) => {
                    bgImage.onload = resolve;
                    bgImage.src = mosque.url;
                });

                for (let frame = 0; frame < 300; frame++) { // 10 ثواني لكل آية
                    // رسم الخلفية
                    ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);
                    
                    // إضافة طبقة شفافة داكنة لتحسين قراءة النص
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    // رسم إطار زخرفي
                    ctx.strokeStyle = 'rgba(255, 215, 0, 0.3)';
                    ctx.lineWidth = 4;
                    ctx.strokeRect(20, 20, canvas.width - 40, canvas.height - 40);

                    // رسم النص القرآني
                    ctx.font = 'bold 56px Amiri';
                    ctx.fillStyle = 'white';
                    ctx.textAlign = 'center';
                    ctx.shadowColor = 'rgba(0,0,0,0.8)';
                    ctx.shadowBlur = 15;
                    ctx.shadowOffsetX = 3;
                    ctx.shadowOffsetY = 3;
                    
                    // تقسيم النص الطويل
                    const words = ayah.text.split(' ');
                    let lines = [];
                    let currentLine = '';
                    
                    for (let word of words) {
                        const testLine = currentLine + ' ' + word;
                        const metrics = ctx.measureText(testLine);
                        if (metrics.width > 1000 && currentLine) {
                            lines.push(currentLine);
                            currentLine = word;
                        } else {
                            currentLine = testLine;
                        }
                    }
                    lines.push(currentLine);
                    
                    // رسم الخطوط
                    const startY = canvas.height/2 - (lines.length * 40);
                    lines.forEach((line, index) => {
                        ctx.fillText(line.trim(), canvas.width/2, startY + index * 80);
                    });

                    // رسم رقم الآية بشكل زخرفي
                    ctx.font = '40px Amiri';
                    ctx.fillStyle = '#FFD700';
                    ctx.shadowColor = 'rgba(0,0,0,0.5)';
                    ctx.fillText(`﴿${ayah.number}﴾`, canvas.width/2, canvas.height - 80);
                    
                    // التقدم
                    updateProgress(30 + (i / ayahTexts.length) * 60, 
                        `جاري إنشاء الفيديو: الآية ${i + 1}/${ayahTexts.length}`);
                    
                    await new Promise(r => setTimeout(r, 33)); // ~30fps
                }
            }

            // إنهاء التسجيل
            recorder.stop();
            
            // إيقاف الصوتيات
            audioElements.forEach(audio => {
                audio.pause();
                audio.currentTime = 0;
            });

            updateProgress(100, 'تم الإنشاء بنجاح!');
        }

        function updateProgress(percent, status) {
            document.getElementById('progressFill').style.width = `${percent}%`;
            document.getElementById('progressStatus').textContent = status;
        }

        // ==================== Event Listeners ====================
        document.getElementById('reciter').addEventListener('change', loadSurahs);
        
        document.getElementById('surah').addEventListener('change', (e) => {
            if (e.target.value) {
                const selected = e.target.options[e.target.selectedIndex];
                const ayahs = selected.getAttribute('data-ayahs');
                document.getElementById('toAyah').max = ayahs;
                document.getElementById('toAyah').value = Math.min(3, ayahs);
            }
            updatePreview();
        });

        document.getElementById('fromAyah').addEventListener('change', updatePreview);
        document.getElementById('toAyah').addEventListener('change', updatePreview);

        document.getElementById('generateBtn').addEventListener('click', async () => {
            if (!document.getElementById('surah').value) {
                alert('الرجاء اختيار السورة');
                return;
            }

            document.getElementById('progressArea').style.display = 'block';
            document.getElementById('resultArea').style.display = 'none';
            document.getElementById('errorArea').style.display = 'none';
            document.getElementById('generateBtn').disabled = true;

            try {
                await generateVideo();
                document.getElementById('resultArea').style.display = 'block';
                document.getElementById('progressArea').style.display = 'none';
            } catch (error) {
                document.getElementById('errorArea').style.display = 'block';
                document.getElementById('errorArea').innerHTML = 'خطأ: ' + error.message;
            } finally {
                document.getElementById('generateBtn').disabled = false;
            }
        });

        document.getElementById('downloadBtn').addEventListener('click', () => {
            const video = document.getElementById('resultVideo');
            if (video.src) {
                const a = document.createElement('a');
                a.href = video.src;
                a.download = `quran_${Date.now()}.webm`;
                a.click();
            }
        });

        document.getElementById('newVideoBtn').addEventListener('click', () => {
            document.getElementById('resultArea').style.display = 'none';
        });

        // بدء التطبيق
        loadMosqueBackgrounds();
        loadReciters();
    </script>
</body>
</html>
