<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مولد فيديوهات القرآن الكريم - أونلاين</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:#f0f0f0; padding:20px; }
    .container { max-width:1400px; margin:0 auto; background:white; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.2); overflow:hidden; }
    header { background:#203a43; color:white; padding:30px; text-align:center; }
    header h1 { font-size:2.5em; margin-bottom:10px; }
    header p { font-size:1.2em; opacity:0.9; }
    .main-content { display:grid; grid-template-columns:400px 1fr; gap:20px; padding:20px; }
    .control-panel, .preview-panel { background:#f8f9fa; border-radius:15px; padding:20px; }
    h2 { color:#2c3e50; margin-bottom:20px; padding-bottom:10px; border-bottom:3px solid #fdbb2d; }
    .form-group { margin-bottom:20px; }
    .form-group label { display:block; margin-bottom:8px; color:#34495e; font-weight:600; }
    .form-control { width:100%; padding:12px; border:2px solid #ddd; border-radius:8px; font-size:1em; font-family:'Amiri', serif; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .btn-primary { width:100%; padding:15px; background:#203a43; color:white; border:none; border-radius:8px; font-size:1.2em; font-weight:bold; cursor:pointer; }
    .btn-primary:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 5px 20px rgba(0,0,0,0.3); }
    .btn-primary:disabled { opacity:0.5; cursor:not-allowed; }
    .btn-secondary { padding:10px 20px; background:#3498db; color:white; border:none; border-radius:5px; cursor:pointer; margin:5px; }
    .ayah-preview { background:white; padding:30px; border-radius:10px; text-align:center; margin-bottom:20px; border:2px solid #fdbb2d; min-height:200px; }
    .arabic { font-family:'Amiri', serif; font-size:2.2em; margin-bottom:20px; color:#2c3e50; line-height:1.8; }
    .progress-container { margin-top:20px; }
    .progress-bar { height:20px; background:#ecf0f1; border-radius:10px; overflow:hidden; margin:10px 0; }
    .progress-fill { height:100%; background:#203a43; transition:width 0.3s; }
    #resultVideo { width:100%; border-radius:10px; margin:10px 0; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js"></script>
</head>
<body>
<div class="container">
<header>
    <h1>🎬 مولد فيديوهات القرآن الكريم</h1>
    <p>كل شيء أونلاين بدون تحميل</p>
</header>

<div class="main-content">
    <!-- لوحة التحكم -->
    <div class="control-panel">
        <h2>⚙️ الإعدادات</h2>
        <div class="form-group">
            <label>🎤 اختر القارئ:</label>
            <select id="reciter" class="form-control">
                <option value="">جاري التحميل...</option>
            </select>
        </div>
        <div class="form-group">
            <label>📖 اختر السورة:</label>
            <select id="surah" class="form-control" disabled>
                <option value="">اختر القارئ أولاً</option>
            </select>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>من آية:</label>
                <input type="number" id="fromAyah" class="form-control" min="1" value="1">
            </div>
            <div class="form-group">
                <label>إلى آية:</label>
                <input type="number" id="toAyah" class="form-control" min="1" value="3">
            </div>
        </div>
        <button id="generateBtn" class="btn-primary">🎬 إنشاء الفيديو</button>
    </div>

    <!-- المعاينة -->
    <div class="preview-panel">
        <h2>👁️ المعاينة</h2>
        <div id="ayahPreview" class="ayah-preview">
            <div class="arabic" id="previewArabic"></div>
        </div>
        <div id="progressArea" style="display:none;">
            <h3>⏳ جاري إنشاء الفيديو...</h3>
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill" style="width:0%;"></div>
            </div>
            <p id="progressStatus">بدء المعالجة...</p>
        </div>
        <div id="resultArea" style="display:none;">
            <h3>✅ تم إنشاء الفيديو!</h3>
            <video id="resultVideo" controls autoplay></video>
        </div>
    </div>
</div>
</div>

<script>
// قائمة القراء
const READERS = [
    { id: 'ar.abdulbasit', name: 'عبد الباسط عبد الصمد' },
    { id: 'ar.saudalshuraym', name: 'سعود الشريم' }
];

// السور
const SURAHS = [
    { number:1, name:'الفاتحة', ayahs:7 },
    { number:2, name:'البقرة', ayahs:286 }
];

// خلفيات جوامع تركية
const BACKGROUNDS = [
    'https://images.pexels.com/photos/35574185/pexels-photo-35574185.jpeg',
    'https://images.pexels.com/photos/9138165/pexels-photo-9138165.jpeg',
    'https://images.unsplash.com/photo-1601758123927-58bfa720292f',
    'https://images.unsplash.com/photo-1544451926-6762a58c2c43'
];

let currentAyahs = [];

// تحميل القراء
function loadReaders(){
    const select = document.getElementById('reciter');
    select.innerHTML = '<option value="">اختر القارئ...</option>';
    READERS.forEach(r=>{
        const option=document.createElement('option');
        option.value=r.id; option.textContent=r.name;
        select.appendChild(option);
    });
}

// تحميل السور
function loadSurahs(){
    const select=document.getElementById('surah');
    select.innerHTML='<option value="">اختر السورة...</option>';
    select.disabled=false;
    SURAHS.forEach(s=>{
        const option=document.createElement('option');
        option.value=s.number; option.textContent=`${s.number}. ${s.name}`;
        option.setAttribute('data-ayahs',s.ayahs);
        select.appendChild(option);
    });
}

// جلب نص الآية
async function fetchAyahText(surah,ayah){
    try{
        const res=await axios.get(`https://api.alquran.cloud/v1/ayah/${surah}:${ayah}`);
        return res.data.data.text;
    }catch(e){return 'خطأ';}
}

// تحديث المعاينة
async function updatePreview(){
    const surah=document.getElementById('surah').value;
    const fromAyah=document.getElementById('fromAyah').value;
    if(!surah) return;
    const text=await fetchAyahText(surah,fromAyah);
    document.getElementById('previewArabic').innerHTML=text;
}

// إنشاء الفيديو أونلاين مع الصوت والصور
async function generateVideo(){
    const surah=document.getElementById('surah').value;
    const fromAyah=parseInt(document.getElementById('fromAyah').value);
    const toAyah=parseInt(document.getElementById('toAyah').value);
    const reciter=document.getElementById('reciter').value;

    currentAyahs=[];
    for(let i=fromAyah;i<=toAyah;i++){
        const text=await fetchAyahText(surah,i);
        const audio=new Audio(`https://www.everyayah.com/data/${reciter}/${String(surah).padStart(3,'0')}${String(i).padStart(3,'0')}.mp3`);
        currentAyahs.push({text,audio});
        updateProgress(20+(i-fromAyah+1)/(toAyah-fromAyah+1)*30,`تم تحميل الآية ${i-fromAyah+1}/${toAyah-fromAyah+1}`);
    }

    const canvas=document.createElement('canvas'); canvas.width=1280; canvas.height=720;
    const ctx=canvas.getContext('2d');
    const stream=canvas.captureStream(30);
    const recorder=new MediaRecorder(stream);
    const chunks=[];

    recorder.ondataavailable=e=>chunks.push(e.data);
    recorder.onstop=()=>{
        const blob=new Blob(chunks,{type:'video/webm'});
        document.getElementById('resultVideo').src=URL.createObjectURL(blob);
    };
    recorder.start();

    for(let ayah of currentAyahs){
        const bg=new Image();
        bg.src=BACKGROUNDS[Math.floor(Math.random()*BACKGROUNDS.length)];
        await new Promise(r=>bg.onload=r);

        ayah.audio.play();
        for(let frame=0;frame<240;frame++){
            ctx.drawImage(bg,0,0,canvas.width,canvas.height);
            ctx.font='bold 48px Amiri'; ctx.fillStyle='white'; ctx.textAlign='center';
            ctx.fillText(ayah.text,canvas.width/2,canvas.height/2);
            await new Promise(r=>setTimeout(r,33));
        }
        ayah.audio.pause(); ayah.audio.currentTime=0;
    }

    recorder.stop();
    updateProgress(100,'تم الإنشاء بنجاح!');
}

function updateProgress(p,s){
    document.getElementById('progressFill').style.width=p+'%';
    document.getElementById('progressStatus').textContent=s;
}

// الأحداث
document.getElementById('reciter').addEventListener('change',loadSurahs);
document.getElementById('surah').addEventListener('change',updatePreview);
document.getElementById('fromAyah').addEventListener('change',updatePreview);
document.getElementById('toAyah').addEventListener('change',updatePreview);

document.getElementById('generateBtn').addEventListener('click',async()=>{
    if(!document.getElementById('surah').value){alert('اختر السورة'); return;}
    document.getElementById('progressArea').style.display='block';
    document.getElementById('resultArea').style.display='none';
    document.getElementById('generateBtn').disabled=true;
    try{ await generateVideo(); document.getElementById('resultArea').style.display='block'; }
    catch(e){alert('خطأ: '+e.message);}
    finally{document.getElementById('generateBtn').disabled=false; document.getElementById('progressArea').style.display='none';}
});

// بدء التطبيق
loadReaders();
loadSurahs();
</script>
</body>
</html>
